name: notifspy
description: "Notification Spy - Track, filter, and recover phone notifications including deleted WhatsApp messages."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  provider: ^6.1.2
  intl: ^0.20.2
  shared_preferences: ^2.2.3
  uuid: ^4.4.0
  path_provider: ^2.1.2
  permission_handler: ^11.3.1
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4
  fl_chart: ^1.2.0
  share_plus: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.10
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
